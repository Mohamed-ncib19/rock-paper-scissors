<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPS</title>
    <script src="js/index.js" defer></script>
    <script src="https://kit.fontawesome.com/30bc0d4a8c.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="css/style.css">

</head>
<body>
    <header><h2>play RPS now!!!</h2></header>
    <div class="choices">
        <button data-option="rock" class="choice"><i class="fa-solid fa-hand-back-fist"></i></button>
        <button data-option="scissors" class="choice"><i class="fa-solid fa-scissors"></i></button>
        <button data-option="paper" class="choice"><i class="fa-solid fa-hand"></i></button>
    </div>
    <div class="result">
        <p id="demo"></p>
    </div>
</body>
</html>
